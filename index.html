<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WATCH MATRIX</title>
  <style>
    /* ── TOKENS ───────────────────────────────────────────── */
    :root {
      --g0: #000000;
      --g1: #001a00;
      --g2: #003300;
      --g3: #006600;
      --g4: #00cc33;
      --g5: #00ff41;
      --g6: #aaffaa;
      --cyan: #00ffff;
      --yellow: #ffff00;
      --magenta: #ff44ff;
      --card-bg: rgba(0, 18, 0, 0.80);
      --card-hover: rgba(0, 35, 0, 0.95);
      --border: var(--g3);
      --border-bright: var(--g5);
    }

    /* ── RESET ────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── BASE ─────────────────────────────────────────────── */
    body {
      background: var(--g0);
      color: var(--g5);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── MATRIX RAIN CANVAS ───────────────────────────────── */
    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── SCANLINES OVERLAY ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.10) 3px, rgba(0,0,0,0.10) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── LAYOUT ───────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 64px;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    .header {
      border: 1px solid var(--g5);
      padding: 26px 28px 22px;
      margin-bottom: 32px;
      background: rgba(0, 0, 0, 0.88);
      box-shadow:
        0 0 0 1px var(--g3),
        0 0 28px rgba(0,255,65,0.20),
        inset 0 0 28px rgba(0,255,65,0.04);
      text-align: center;
    }

    .header-eyebrow {
      font-size: 0.68em;
      letter-spacing: 0.55em;
      color: var(--g3);
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .header-title {
      font-size: 1.65em;
      letter-spacing: 0.05em;
      color: var(--g5);
      text-shadow: 0 0 14px var(--g5), 0 0 28px rgba(0,255,65,0.4);
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .header-romanji {
      font-size: 0.88em;
      color: var(--g4);
      margin-bottom: 10px;
      font-style: italic;
    }

    .header-ep {
      font-size: 0.95em;
      color: var(--g4);
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    .header-ids {
      font-size: 0.68em;
      color: var(--g3);
      letter-spacing: 0.10em;
      margin-bottom: 14px;
      line-height: 1.9;
    }
    .header-ids span { color: var(--g4); }

    .type-badge {
      display: inline-block;
      border: 1px solid var(--g5);
      padding: 4px 18px;
      font-size: 0.72em;
      letter-spacing: 0.40em;
      color: var(--g5);
      text-shadow: 0 0 8px var(--g5);
      box-shadow: 0 0 8px rgba(0,255,65,0.25);
    }

    /* ── SECTION ──────────────────────────────────────────── */
    .section { margin-bottom: 30px; }

    .section-label {
      font-size: 0.72em;
      letter-spacing: 0.40em;
      color: var(--g5);
      border-bottom: 1px solid var(--g5);
      padding-bottom: 7px;
      margin-bottom: 14px;
      text-shadow: 0 0 6px var(--g5);
    }

    .generalist-label {
      font-size: 0.68em;
      letter-spacing: 0.35em;
      color: var(--g3);
      border-bottom: 1px dashed var(--g3);
      padding-bottom: 6px;
      margin: 24px 0 12px;
    }

    /* ── GRID ─────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
      gap: 8px;
    }

    /* ── SITE CARD ────────────────────────────────────────── */
    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--g5);
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s, transform 0.12s;
      cursor: pointer;
      overflow: hidden;
    }

    .card:hover {
      background: var(--card-hover);
      border-color: var(--border-bright);
      box-shadow: 0 0 16px rgba(0,255,65,0.30), inset 0 0 8px rgba(0,255,65,0.06);
      transform: translateX(4px);
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .card-arrow {
      color: var(--g3);
      font-size: 0.75em;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .card:hover .card-arrow { color: var(--g5); }

    .card-name {
      font-size: 0.88em;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── TAGS ─────────────────────────────────────────────── */
    .tags {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .tag {
      font-size: 0.56em;
      padding: 2px 5px;
      border: 1px solid;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .tag-anime  { border-color: var(--cyan);    color: var(--cyan); }
    .tag-movies { border-color: var(--yellow);  color: var(--yellow); }
    .tag-series { border-color: var(--magenta); color: var(--magenta); }

    /* ── NO-SIGNAL STATE ──────────────────────────────────── */
    .no-signal {
      text-align: center;
      padding: 80px 24px;
      border: 1px dashed var(--g3);
      background: rgba(0,0,0,0.7);
    }
    .no-signal-glyph {
      font-size: 3em;
      color: var(--g3);
      display: block;
      margin-bottom: 20px;
      animation: flicker 2.4s infinite;
    }
    .no-signal-title {
      font-size: 1.1em;
      letter-spacing: 0.4em;
      margin-bottom: 12px;
    }
    .no-signal-sub {
      font-size: 0.76em;
      color: var(--g3);
      line-height: 2;
      letter-spacing: 0.08em;
    }

    /* ── NO MATCH STATE ───────────────────────────────────── */
    .no-match {
      padding: 28px;
      border: 1px dashed var(--g3);
      color: var(--g3);
      font-size: 0.8em;
      letter-spacing: 0.12em;
      text-align: center;
    }

    /* ── DEBUG PANEL ──────────────────────────────────────── */
    .debug-toggle {
      display: block;
      width: 100%;
      margin-top: 40px;
      padding: 9px 14px;
      background: transparent;
      border: 1px dashed var(--g3);
      color: var(--g3);
      font-family: inherit;
      font-size: 0.68em;
      letter-spacing: 0.25em;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .debug-toggle:hover { border-color: var(--g5); color: var(--g5); }

    .debug-body {
      display: none;
      border: 1px dashed var(--g3);
      border-top: none;
      padding: 16px;
      background: rgba(0,0,0,0.92);
      font-size: 0.68em;
      line-height: 2.1;
    }
    .debug-body.open { display: block; }
    .dbk { color: var(--g3); }
    .dbv { color: var(--g6); }
    .db-missing { color: var(--g2); font-style: italic; }

    /* ── ANIMATIONS ───────────────────────────────────────── */
    @keyframes flicker {
      0%,100% { opacity: 1; }
      48% { opacity: 1; }
      50% { opacity: 0.3; }
      52% { opacity: 1; }
      93% { opacity: 1; }
      94% { opacity: 0.5; }
      96% { opacity: 1; }
    }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 520px) {
      .header-title { font-size: 1.2em; }
      .grid { grid-template-columns: 1fr; }
      #app { padding: 16px 12px 48px; }
    }
  </style>
</head>

    url: "https://www.downloads-anymovies.co/search/search.php?q={TITLE_PLUS}"
  },
  
  {
    name: "Cinegram",
    tags: ["movies", "series", "anime"],
    url: "https://cinegram.tv/index.php?menu=search&query={TITLE_SLUG}"
  },
  
  {
    name: "LeVidia",
    tags: ["movies", "series", "anime"],
    url: "https://www.levidia.ch/search.php?q={TITLE_PLUS}&submit.x=0&submit.y=0"
  },
  
];
/* ═══════════════════════════════════════════════════════════════
   END OF SITE CONFIGURATION
═══════════════════════════════════════════════════════════════ */


/* ── Matrix Rain ──────────────────────────────────────────── */
(function () {
  const cv = document.getElementById('rain');
  const cx = cv.getContext('2d');
  const JP = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  const EN = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';
  const CHARS = JP + EN;
  const SZ = 16;
  let drops = [], W = 0, H = 0;

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    drops = Array.from({ length: Math.ceil(W / SZ) }, () => Math.random() * -(H / SZ));
  }

  function tick() {
    cx.fillStyle = 'rgba(0,0,0,0.048)';
    cx.fillRect(0, 0, W, H);
    for (let i = 0; i < drops.length; i++) {
      const r = Math.random();
      cx.fillStyle = r > 0.97 ? '#ccffcc' : r > 0.85 ? '#00ff41' : '#008f11';
      cx.font = `${r > 0.97 ? 15 : 13}px Courier New`;
      cx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], i * SZ, drops[i] * SZ);
      if (drops[i] * SZ > H && Math.random() > 0.975) drops[i] = -Math.random() * 20;
      drops[i] += 0.9 + Math.random() * 0.2;
    }
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(tick, 52);
})();


/* ── Param helpers ────────────────────────────────────────── */

function slugify(str) {
  return str
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^\w\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-');
}

function underscoreify(str) {
  return slugify(str).replace(/-/g, '_');
}

function plusify(str) {
  return encodeURIComponent(str).replace(/%20/g, '+');
}

function pad2(value) {
  return String(value).padStart(2, '0');
}

function expandParams(p) {

  /* TITLE */
  if (p.TITLE) {
    p.TITLE_PLUS       ||= plusify(p.TITLE);
    p.TITLE_SLUG       ||= slugify(p.TITLE);
    p.TITLE_UNDERSCORE ||= underscoreify(p.TITLE);
  }

  /* ROMANJI */
  if (p.TITLE_ROMANJI) {
    p.TITLE_ROMANJI_PLUS ||= plusify(p.TITLE_ROMANJI);
    p.TITLE_ROMANJI_SLUG ||= slugify(p.TITLE_ROMANJI);
  }

  /* EP TITLE */
  if (p.EP_TITLE) {
    p.EP_TITLE_PLUS       ||= plusify(p.EP_TITLE);
    p.EP_TITLE_SLUG       ||= slugify(p.EP_TITLE);
    p.EP_TITLE_UNDERSCORE ||= underscoreify(p.EP_TITLE);
  }

  /* CURRENT SEASON */
  if (p.S) {
    p.SS          ||= pad2(p.S);
    p.S01         ||= pad2(p.S);
    p.SEASON1     ||= p.S;
    p.SEASON_DASH ||= `season-${p.S}`;
  }

  /* CURRENT EPISODE */
  if (p.E) {
    p.EE            ||= pad2(p.E);
    p.E01           ||= pad2(p.E);
    p.EPISODE1      ||= p.E;
    p.EPISODE_DASH  ||= `episode-${p.E}`;
  }

  /* NEXT SEASON */
  if (p.NEXT_S) {
    p.NEXT_SS  ||= pad2(p.NEXT_S);
    p.NEXT_S01 ||= pad2(p.NEXT_S);
  }

  /* NEXT EPISODE */
  if (p.NEXT_E) {
    p.NEXT_EE  ||= pad2(p.NEXT_E);
    p.NEXT_E01 ||= pad2(p.NEXT_E);
  }

  /* TYPE DERIVATIVES */
  const type = (p.TYPE || '').toLowerCase();

  switch (type) {

    case 'anime':
      p.TYPES              ||= 'anime';
      p.TYPE_SHOW          ||= 'show';
      p.TYPE_SHOWS         ||= 'shows';
      p.TYPE_SERIES_MOVIE  ||= 'series';
      p.TYPE_SERIES_MOVIES ||= 'series';
      break;

    case 'movie':
      p.TYPES              ||= 'movies';
      p.TYPE_SHOW          ||= 'movie';
      p.TYPE_SHOWS         ||= 'movies';
      p.TYPE_SERIES_MOVIE  ||= 'movie';
      p.TYPE_SERIES_MOVIES ||= 'movies';
      break;

    case 'tv':
      p.TYPES              ||= 'shows';
      p.TYPE_SHOW          ||= 'show';
      p.TYPE_SHOWS         ||= 'shows';
      p.TYPE_SERIES_MOVIE  ||= 'series';
      p.TYPE_SERIES_MOVIES ||= 'series';
      break;
  }

  return p;
}

function getParams() {
  const p = {};

  const aliases = {
  t: "TITLE",
  r: "TITLE_ROMANJI",
  y: "YEAR",

  s: "S",
  e: "E",

  ns: "NEXT_S",
  ne: "NEXT_E",

  type: "TYPE",
  at: "ANIME_TYPE",

  sid: "SIMKL_ID",

  im: "IMDB",
  tm: "TMDB",
  ki: "KITSU",
  al: "ANILIST",

  tv: "TVDB",
  tvs: "TVDB_SLUG",
  tve: "TVDB_EP_ID",

  mal: "IMDB_MAL"
};

  new URLSearchParams(window.location.search).forEach((value, key) => {
    p[aliases[key] || key] = value;
  });

  return expandParams(p);
}

/* ── URL template resolver ────────────────────────────────── */
const RAW_SAFE = new Set([
  'TITLE_SLUG','TITLE_UNDERSCORE','TITLE_PLUS','TITLE_ROMANJI_SLUG','TITLE_ROMANJI_PLUS',
  'EP_TITLE_SLUG','EP_TITLE_UNDERSCORE','EP_TITLE_PLUS',
  'TVDB_SLUG','SEASON_DASH','EPISODE_DASH',
  'TYPE','TYPES','TYPE_SHOW','TYPE_SHOWS','TYPE_SERIES_MOVIE','TYPE_SERIES_MOVIES','ANIME_TYPE',
  'S','SS','S01','SEASON1','E','EE','E01','EPISODE1',
  'NEXT_S','NEXT_SS','NEXT_S01','NEXT_E','NEXT_EE','NEXT_E01',
  'YEAR','TMDB','IMDB','ANILIST','SIMKL_ID','KITSU','TVDB','TVDB_EP_ID','IMDB_MAL'
]);

function resolveUrl(tmpl, params) {
  return tmpl.replace(/\{([^}]+)\}/g, (_, key) => {
    const val = params[key];
    if (val === undefined || val === '' || val === '0') return '';
    return RAW_SAFE.has(key) ? val : encodeURIComponent(val);
  });
}

/* ── Media type ───────────────────────────────────────────── */
function getType(params) {
  const t = (params.TYPE || '').toLowerCase();
  if (t === 'anime') return 'anime';
  if (t === 'movie') return 'movie';
  return 'tv';
}

/* ── Site classification ──────────────────────────────────── */
function isGeneralist(site) {
  return site.tags.includes('anime') && site.tags.includes('movies') && site.tags.includes('series');
}

function isSpecialistFor(site, typeKey) {
  return !isGeneralist(site) && site.tags.includes(typeKey);
}

/* ── Tag HTML ─────────────────────────────────────────────── */
function tagsHtml(tags) {
  return tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
}

/* ── Card HTML ────────────────────────────────────────────── */
function cardHtml(site, params) {
  const href = resolveUrl(site.url, params);
  return `<a class="card" href="${href}" target="_blank" rel="noopener noreferrer">
    <span class="card-left">
      <span class="card-arrow">&#9654;</span>
      <span class="card-name">${site.name}</span>
    </span>
    <span class="tags">${tagsHtml(site.tags)}</span>
  </a>`;
}

/* ── Main render ──────────────────────────────────────────── */
function render() {
  const params = getParams();
  const app    = document.getElementById('app');
  const hasData = params.TYPE || params.TITLE;

  /* ── No-signal state ── */
  if (!hasData) {
    app.innerHTML = `
      <div class="no-signal">
        <span class="no-signal-glyph">◈</span>
        <div class="no-signal-title">[ NO SIGNAL RECEIVED ]</div>
        <div class="no-signal-sub">
          This page should be opened from a SIMKL media link.<br>
          No stream data was found in the URL.
        </div>
      </div>`;
    return;
  }

  /* ── Extract display data ── */
  const type    = getType(params);
  const typeKey = type === 'movie' ? 'movies' : (type === 'tv' ? 'series' : type);

  const title    = params.TITLE || '';
  const romanji  = (type === 'anime' && params.TITLE_ROMANJI && params.TITLE_ROMANJI !== params.TITLE)
                   ? params.TITLE_ROMANJI : '';
  const year     = params.YEAR ? ` (${params.YEAR})` : '';
  const typeLbl  = { anime: 'ANIME', movie: 'MOVIE', tv: 'SERIES' }[type];

  /* Episode info */
  let epLine = '';
  if (type !== 'movie') {
    const s  = params.NEXT_S  || '';
    const e  = params.NEXT_E  || '';
    const ss = params.NEXT_SS || (s ? String(s).padStart(2,'0') : '');
    const ee = params.NEXT_EE || (e ? String(e).padStart(2,'0') : '');
    if (s && e)  epLine = `S${ss} · E${ee}`;
    else if (e)  epLine = `EP ${ee}`;
  }

  /* ID bar */
  const idParts = [
    params.IMDB    && `IMDB <span>${params.IMDB}</span>`,
    params.TMDB    && `TMDB <span>${params.TMDB}</span>`,
    params.ANILIST && `AL <span>${params.ANILIST}</span>`,
    (type === 'anime' && params.IMDB_MAL) && `MAL <span>${params.IMDB_MAL}</span>`,
    params.TVDB    && `TVDB <span>${params.TVDB}</span>`,
    params.KITSU   && `Kitsu <span>${params.KITSU}</span>`,
  ].filter(Boolean);

  /* Sort sites */
  const specialists = SITES.filter(s => isSpecialistFor(s, typeKey));
  const generalists = SITES.filter(s => isGeneralist(s));

  /* Section header text */
  const sectionLbl = {
    anime: '// ANIME STREAMS',
    movie: '// MOVIE STREAMS',
    tv:    '// SERIES STREAMS'
  }[type];

  /* ── Build HTML ── */
  let html = `
    <div class="header">
      <div class="header-eyebrow">◈ WATCH MATRIX ◈</div>
      <div class="header-title">${title}${year}</div>
      ${romanji ? `<div class="header-romanji">${romanji}</div>` : ''}
      ${epLine  ? `<div class="header-ep">▸ ${epLine}</div>` : ''}
      ${idParts.length ? `<div class="header-ids">${idParts.join('  ·  ')}</div>` : ''}
      <div class="type-badge">${typeLbl}</div>
    </div>`;

  /* Specialists section */
  if (specialists.length > 0) {
    html += `
      <div class="section">
        <div class="section-label">${sectionLbl}</div>
        <div class="grid">${specialists.map(s => cardHtml(s, params)).join('')}</div>
      </div>`;
  }

  /* Generalists section */
  if (generalists.length > 0) {
    html += `
      <div class="section">
        <div class="generalist-label">// GENERALIST PLATFORMS</div>
        <div class="grid">${generalists.map(s => cardHtml(s, params)).join('')}</div>
      </div>`;
  }

  /* Nothing configured */
  if (!specialists.length && !generalists.length) {
    html += `<div class="no-match">// NO STREAMS CONFIGURED FOR TYPE: ${typeLbl}</div>`;
  }

  /* Debug panel — all raw params */
  const ALL_PARAMS = [
    ['TITLE','TITLE_PLUS','TITLE_SLUG','TITLE_UNDERSCORE'],
    ['TITLE_ROMANJI','TITLE_ROMANJI_PLUS','TITLE_ROMANJI_SLUG','YEAR'],
    ['NEXT_S','NEXT_SS','NEXT_S01','NEXT_E','NEXT_EE','NEXT_E01'],
    ['TYPE','TYPES','TYPE_SHOW','TYPE_SHOWS','TYPE_SERIES_MOVIE','TYPE_SERIES_MOVIES','ANIME_TYPE'],
    ['SIMKL_ID','IMDB','TMDB','KITSU','ANILIST','TVDB','TVDB_SLUG','TVDB_EP_ID','IMDB_MAL'],
  ];
  const dbRows = ALL_PARAMS.flat().map(k => {
    const v = params[k];
    return v
      ? `<span class="dbk">${k}</span> = <span class="dbv">${v}</span>`
      : `<span class="db-missing">${k} — not provided</span>`;
  }).join('<br>');

  html += `
    <button class="debug-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
      &#9654; SHOW RAW SIGNAL DATA
    </button>
    <div class="debug-body">${dbRows}</div>`;

  app.innerHTML = html;
}

render();
</script>
